[project]
site_name = "Website Monitor System"
site_url = "https://github.com/AshuApurva14/python-for-devops"
site_description = "A new project generated from the default template project."
docs_dir = "docs"
site_dir = "site"

site_author = "Ashutosh Apurva"


[project.theme]
variant  = "modern"
font.text = "Inter"          # was "Roboto" → cleaner, modern body text
font.code = "JetBrains Mono"
features = [
  "navigation.instant",
  "navigation.tabs",
  "navigation.top",
]

# Light mode palette
[[project.theme.palette]]
media  = "(prefers-color-scheme: light)"   # auto-detect system preference
scheme = "default"                         # "default" = light mode
primary = "orange"                           # main color (links, header, sidebar)
accent  = "light-green"                           # highlight color (buttons, hover)
toggle.icon = "lucide/sun"                 # icon shown in the toggle button
toggle.name = "Switch to dark mode"        # tooltip text

# Dark mode palette
[[project.theme.palette]]
media  = "(prefers-color-scheme: dark)"    # auto-detect system preference
scheme = "slate"                           # "slate" = dark mode
primary = "green"
accent  = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

nav = [
  {"Home"            = "index.md"},
  {"Getting Started" = [
    "getting-started/README.md"
  ]},
  {"GitHub Repo" = "https://github.com/your-username/website-monitor"}
]

extra_css = ["stylesheets/extra.css"]



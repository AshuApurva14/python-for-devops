name: Website Monitor System

on:
    workflow_dispatch:

    # schedule:
    #     - cron: '1 * * * *'
        

jobs:

    website-monitor:
        name: website-monitor
        runs-on: 'ubuntu-latest'
        steps:

            - name: Checkout Repository
              uses: actions/checkout@v6

            
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                python-version: 'projects/website-monitor-system/pyproject.toml'

            - name: Install uv
              uses: astral-sh/setup-uv@v7
            
            - name: Install the project
              run: uv sync 

            - name: Execute Script
              run: |
                
                python projects/website-monitor-system/main.py
